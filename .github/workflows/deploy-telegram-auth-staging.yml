name: Deploy Telegram auth to staging

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DEPLOY-TELEGRAM-AUTH to confirm the staging deployment
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-telegram-auth-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy telegram-auth
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Validate confirmation
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          if [ "$CONFIRMATION" != "DEPLOY-TELEGRAM-AUTH" ]; then
            echo "Invalid confirmation."
            exit 1
          fi

      - name: Validate required secret
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN is not configured in the staging environment."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy telegram-auth
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: >
          supabase functions deploy telegram-auth
          --project-ref bosjuelpvkqpdgazxteu
          --no-verify-jwt
